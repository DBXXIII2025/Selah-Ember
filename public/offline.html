<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#151210" />
    <title>Selah Ember is offline</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7ead7;
        --foreground: #211814;
        --ember: #a94720;
        --muted: #67564c;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--background);
        color: var(--foreground);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        max-width: 34rem;
        padding: 2rem;
        text-align: center;
      }

      p:first-child {
        margin: 0;
        color: var(--ember);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0.75rem 0 0;
        font-size: clamp(2rem, 8vw, 3rem);
      }

      p:last-child {
        color: var(--muted);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Selah Ember</p>
      <h1>You are offline</h1>
      <p>Reconnect to load community posts, messages, uploads, and account features.</p>
    </main>
  </body>
</html>
